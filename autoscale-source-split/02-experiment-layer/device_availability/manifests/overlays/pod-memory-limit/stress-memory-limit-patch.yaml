apiVersion: batch/v1
kind: Job
metadata:
  name: device-avail-cpu-stress
  namespace: intent-lab
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
        - name: stress
          resources:
            requests:
              cpu: 500m
              memory: 64Mi
            limits:
              cpu: "4"
              memory: 128Mi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: device-avail-mem-stress
  namespace: intent-lab
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
        - name: stress
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 7Gi
