apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-sentinel
  namespace: intent-lab
spec:
  template:
    spec:
      priorityClassName: device-availability-sentinel-high
      containers:
        - name: node-sentinel
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 128Mi
