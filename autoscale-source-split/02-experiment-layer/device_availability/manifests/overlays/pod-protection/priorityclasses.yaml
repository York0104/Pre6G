apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: device-availability-sentinel-high
value: 100000
preemptionPolicy: PreemptLowerPriority
globalDefault: false
description: "Prepared only. Higher priority for node-sentinel during pod-level protection A/B tests."
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: device-availability-stress-nonpreempting-low
value: -1000
preemptionPolicy: Never
globalDefault: false
description: "R2 stress jobs rank below default-priority workloads and must not preempt them."
