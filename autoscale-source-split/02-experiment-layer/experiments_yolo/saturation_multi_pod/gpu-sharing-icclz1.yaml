apiVersion: v1
kind: ConfigMap
metadata:
  name: gpu-sharing-config
  namespace: nvidia-device-plugin
data:
  default: |-
    version: v1
    flags:
      migStrategy: none

  icclz1-shared-4: |-
    version: v1
    flags:
      migStrategy: none
    sharing:
      timeSlicing:
        renameByDefault: true
        failRequestsGreaterThanOne: true
        resources:
        - name: nvidia.com/gpu
          replicas: 4
