apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-dashboard
  namespace: pre6g-dashboard
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: cluster-dashboard
  template:
    metadata:
      labels:
        app: cluster-dashboard
    spec:
      nodeSelector:
        kubernetes.io/hostname: icclz2
      initContainers:
        - name: copy-dashboard-dist
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
            - >
              cp -a /opt/dashboard-dist/. /usr/share/nginx/html/
          volumeMounts:
            - name: dashboard-dist
              mountPath: /opt/dashboard-dist
              readOnly: true
            - name: dashboard-html
              mountPath: /usr/share/nginx/html
      containers:
        - name: cluster-dashboard
          image: nginx:1.29-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
            - >
              printf "window.__PRE6G_DASHBOARD_CONFIG__ = {\n  apiBase: \"%s\",\n  apiToken: \"%s\"\n};\n"
              "${PRE6G_DASHBOARD_API_BASE:-http://140.113.179.9:30081}"
              "${PRE6G_DASHBOARD_API_TOKEN:-}"
              > /usr/share/nginx/html/env-config.js &&
              exec nginx -g 'daemon off;'
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: cluster-dashboard-config
            - secretRef:
                name: cluster-dashboard-secret
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: dashboard-html
              mountPath: /usr/share/nginx/html
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
      volumes:
        - name: dashboard-dist
          hostPath:
            path: /home/icclz2/Pre6G/autoscale-source-split/03-shared-api-dashboard/cluster-dashboard/dist
            type: Directory
        - name: dashboard-html
          emptyDir: {}
        - name: nginx-conf
          hostPath:
            path: /home/icclz2/Pre6G/autoscale-source-split/03-shared-api-dashboard/cluster-dashboard/nginx
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: cluster-dashboard
  namespace: pre6g-dashboard
spec:
  type: NodePort
  selector:
    app: cluster-dashboard
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
