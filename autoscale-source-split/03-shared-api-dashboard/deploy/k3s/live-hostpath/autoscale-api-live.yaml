apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscale-api
  namespace: pre6g-dashboard
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: autoscale-api
  template:
    metadata:
      labels:
        app: autoscale-api
    spec:
      serviceAccountName: autoscale-api
      nodeSelector:
        kubernetes.io/hostname: icclz2
      initContainers:
        - name: install-python-deps
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
            - >
              python -m pip install --no-cache-dir
              -r /workspace/autoscale-source-split/03-shared-api-dashboard/requirements.txt
              -t /python-deps
          volumeMounts:
            - name: workspace
              mountPath: /workspace
              readOnly: true
            - name: python-deps
              mountPath: /python-deps
      containers:
        - name: autoscale-api
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/autoscale-source-split/03-shared-api-dashboard/autoscale_api
          command:
            - /bin/sh
            - -lc
            - >
              python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PYTHONPATH
              value: /python-deps:/workspace/autoscale-source-split/03-shared-api-dashboard/autoscale_api:/workspace/autoscale-source-split/01-monitoring-layer
          envFrom:
            - configMapRef:
                name: autoscale-api-config
            - secretRef:
                name: autoscale-api-secret
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: workspace
              mountPath: /workspace
              readOnly: true
            - name: python-deps
              mountPath: /python-deps
            - name: kubectl-bin
              mountPath: /usr/local/bin/kubectl
              readOnly: true
      volumes:
        - name: workspace
          hostPath:
            path: /home/icclz2/Pre6G
            type: Directory
        - name: python-deps
          emptyDir: {}
        - name: kubectl-bin
          hostPath:
            path: /usr/local/bin/kubectl
            type: File
---
apiVersion: v1
kind: Service
metadata:
  name: autoscale-api
  namespace: pre6g-dashboard
spec:
  type: NodePort
  selector:
    app: autoscale-api
  ports:
    - name: http
      port: 8000
      targetPort: http
      nodePort: 30081
