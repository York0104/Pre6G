apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscale-api
  namespace: pre6g-dashboard
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: autoscale-api
  template:
    metadata:
      labels:
        app: autoscale-api
    spec:
      serviceAccountName: autoscale-api
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: autoscale-api
          image: harbor.iccl.local:8088/pre6g/autoscale-api:0.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: autoscale-api-config
            - secretRef:
                name: autoscale-api-secret
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: autoscale-api
  namespace: pre6g-dashboard
spec:
  type: NodePort
  selector:
    app: autoscale-api
  ports:
    - name: http
      port: 8000
      targetPort: http
      nodePort: 30081
