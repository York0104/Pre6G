apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-dashboard
  namespace: pre6g-dashboard
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: cluster-dashboard
  template:
    metadata:
      labels:
        app: cluster-dashboard
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: cluster-dashboard
          image: harbor.iccl.local:8088/pre6g/cluster-dashboard:0.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: cluster-dashboard-config
            - secretRef:
                name: cluster-dashboard-secret
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cluster-dashboard
  namespace: pre6g-dashboard
spec:
  type: NodePort
  selector:
    app: cluster-dashboard
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
