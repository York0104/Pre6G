apiVersion: v1
kind: Namespace
metadata:
  name: pre6g-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pre6g-inventory-script
  namespace: pre6g-system
data:
  collect.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    NODE_NAME="${NODE_NAME:-unknown}"
    export DEBIAN_FRONTEND=noninteractive
    apt-get update -qq
    apt-get install -y -qq util-linux dmidecode >/dev/null

    LSCU_OUT="$(lscpu || true)"
    model_name="$(echo "$LSCU_OUT" | awk -F: '/Model name/ {gsub(/^[ \t]+/, "", $2); print $2; exit}')"
    max_mhz="$(echo "$LSCU_OUT" | awk -F: '/CPU max MHz/ {gsub(/^[ \t]+/, "", $2); print $2; exit}')"
    min_mhz="$(echo "$LSCU_OUT" | awk -F: '/CPU min MHz/ {gsub(/^[ \t]+/, "", $2); print $2; exit}')"
    l1d="$(echo "$LSCU_OUT" | awk -F: '/L1d cache/ {gsub(/^[ \t]+/, "", $2); print $2; exit}')"
    l1i="$(echo "$LSCU_OUT" | awk -F: '/L1i cache/ {gsub(/^[ \t]+/, "", $2); print $2; exit}')"
    l2="$(echo "$LSCU_OUT" | awk -F: '/L2 cache/ {gsub(/^[ \t]+/, "", $2); print $2; exit}')"
    l3="$(echo "$LSCU_OUT" | awk -F: '/L3 cache/ {gsub(/^[ \t]+/, "", $2); print $2; exit}')"

    base_clock="$(python3 -c 'import re, sys; match = re.search(r"@\s*([0-9.]+)GHz", sys.argv[1]); print(match.group(1) if match else "")' "$model_name")"
    if [[ -z "$base_clock" && -n "$min_mhz" ]]; then
      base_clock="$(python3 -c 'import sys; print(round(float(sys.argv[1]) / 1000.0, 2)) if sys.argv[1] else print("")' "$min_mhz" 2>/dev/null || true)"
    fi
    max_clock="$(python3 -c 'import sys; print(round(float(sys.argv[1]) / 1000.0, 2)) if sys.argv[1] else print("")' "$max_mhz" 2>/dev/null || true)"

    DMI_OUT="$(dmidecode --type memory 2>/dev/null || true)"
    ddr_gen="$(echo "$DMI_OUT" | awk -F: '/^[[:space:]]*Type:/ {gsub(/^[ \t]+/, "", $2); if ($2 ~ /^DDR[0-9]+$/) {print $2; exit}}')"
    freq="$(echo "$DMI_OUT" | awk -F: '/Configured Memory Speed|Speed/ {gsub(/^[ \t]+/, "", $2); if ($2 ~ /MT\/s/) {gsub(/ MT\/s/, "", $2); print $2; exit}}')"

    python3 -c '
    import json
    import sys

    def null_if_empty(value):
        return None if value == "" else value

    def to_float(value):
        try:
            return float(value)
        except Exception:
            return None

    def to_int(value):
        try:
            return int(value)
        except Exception:
            return None

    print(json.dumps({
        "node_name": sys.argv[1],
        "cpu": {
            "model_name": null_if_empty(sys.argv[2]),
            "base_clock_ghz": to_float(sys.argv[3]),
            "max_clock_ghz": to_float(sys.argv[4]),
            "cache": {
                "l1d": null_if_empty(sys.argv[5]),
                "l1i": null_if_empty(sys.argv[6]),
                "l2": null_if_empty(sys.argv[7]),
                "l3": null_if_empty(sys.argv[8]),
            },
        },
        "memory": {
            "ddr_gen": null_if_empty(sys.argv[9]),
            "frequency_mt_s": to_int(sys.argv[10]),
            "cas_latency": null_if_empty(sys.argv[11]),
        },
    }, ensure_ascii=False))
    ' "$NODE_NAME" "$model_name" "$base_clock" "$max_clock" "$l1d" "$l1i" "$l2" "$l3" "$ddr_gen" "$freq" ""

    sleep infinity
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: pre6g-inventory-collector
  namespace: pre6g-system
spec:
  selector:
    matchLabels:
      app: pre6g-inventory-collector
  template:
    metadata:
      labels:
        app: pre6g-inventory-collector
    spec:
      hostPID: true
      hostNetwork: true
      tolerations:
        - operator: Exists
      nodeSelector:
        kubernetes.io/os: linux
      containers:
        - name: collector
          image: python:3.12-slim
          securityContext:
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          command: ["/bin/bash", "/scripts/collect.sh"]
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: pre6g-inventory-script
            defaultMode: 0755
