apiVersion: batch/v1
kind: Job
metadata:
  name: vm-aggregator-once
  namespace: monitoring
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: aggregator
          image: python:3.12-slim
          command: ["python", "-u", "/app/vm_aggregator.py"]
          env:
            - name: VM_URL
              value: "http://vm-victoria-metrics-single-server.monitoring.svc:8428"
            - name: NETDATA_URL
              value: "http://netdata.netdata.svc:19999"
            - name: NETDATA_CHILD_URL
              value: "http://netdata.netdata.svc:19999"
            - name: NETDATA_PARENT_BASE_URL
              value: "http://netdata.netdata.svc:19999"
            - name: NODE
              value: "icclz3"
            - name: NAMESPACE
              value: "intent-lab"
            - name: RATE_WINDOW
              value: "10s"
            - name: SMOOTH_WINDOW
              value: "30s"
            - name: MODE
              value: "fast"
            - name: DEBUG_OUTPUT
              value: "1"
          volumeMounts:
            - name: script
              mountPath: /app
      volumes:
        - name: script
          configMap:
            name: vm-aggregator-script
            defaultMode: 0755
