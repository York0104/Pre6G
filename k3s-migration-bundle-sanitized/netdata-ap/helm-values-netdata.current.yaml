notifications:
  slack:
    recipient: ""
    webhook_url: ""
otel-collector:
  clusterRole:
    create: true
    rules:
    - apiGroups:
      - ""
      resources:
      - pods
      - namespaces
      - nodes
      verbs:
      - get
      - list
      - watch
    - apiGroups:
      - apps
      resources:
      - replicasets
      verbs:
      - get
      - list
      - watch
  config:
    exporters:
      otlp:
        endpoint: '{{ .Release.Name }}-otel:4317'
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_elapsed_time: 300s
          max_interval: 30s
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 1000
        tls:
          insecure: true
    processors:
      batch:
        send_batch_max_size: 1500
        send_batch_size: 1000
        timeout: 10s
      k8sattributes:
        auth_type: serviceAccount
        extract:
          annotations:
          - from: pod
            key: app
            tag_name: annotation.app
          labels:
          - from: pod
            key: app
            tag_name: app
          - from: pod
            key: component
            tag_name: component
          metadata:
          - k8s.namespace.name
          - k8s.deployment.name
          - k8s.statefulset.name
          - k8s.daemonset.name
          - k8s.cronjob.name
          - k8s.job.name
          - k8s.node.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.pod.start_time
          - k8s.container.name
        passthrough: false
        pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: connection
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      resourcedetection:
        detectors:
        - env
        - system
        timeout: 5s
    receivers:
      filelog:
        exclude:
        - /var/log/pods/*/otc-container/*.log
        include:
        - /var/log/pods/*/*/*.log
        include_file_name: false
        include_file_path: true
        operators:
        - id: container-parser
          max_log_size: 102400
          type: container
        start_at: end
    service:
      pipelines:
        logs:
          exporters:
          - otlp
          processors:
          - memory_limiter
          - k8sattributes
          - resourcedetection
          - batch
          receivers:
          - filelog
  enabled: false
  image:
    repository: otel/opentelemetry-collector-k8s
  mode: daemonset
  ports:
    metrics:
      containerPort: 8888
      enabled: true
      protocol: TCP
      servicePort: 8888
    otlp:
      containerPort: 4317
      enabled: true
      protocol: TCP
      servicePort: 4317
    otlp-http:
      containerPort: 4318
      enabled: true
      protocol: TCP
      servicePort: 4318
  presets:
    kubernetesAttributes:
      enabled: true
    logsCollection:
      enabled: true
      includeCollectorLogs: false
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  serviceAccount:
    create: true
  tolerations:
  - effect: NoSchedule
    operator: Exists
  - effect: NoExecute
    operator: Exists
parent:
  affinity: {}
  alarms:
    persistence: false
    storageclass: '-'
    volumesize: 1Gi
  claiming:
    enabled: false
    rooms: ""
    token: ""
    url: https://api.netdata.cloud
  configs:
    example:
      data: |
        alarm: example_alarm1
          on: example.random
        every: 2s
        warn: $random1 > (($status >= $WARNING)  ? (70) : (80))
        crit: $random1 > (($status == $CRITICAL) ? (80) : (90))
        info: random
          to: sysadmin
      enabled: false
      path: /etc/netdata/health.d/example.conf
    exporting:
      data: ""
      enabled: false
      path: /etc/netdata/exporting.conf
    health:
      data: |
        SEND_EMAIL="NO"
        SEND_SLACK="YES"
        SLACK_WEBHOOK_URL="{{ .Values.notifications.slack.webhook_url }}"
        DEFAULT_RECIPIENT_SLACK="{{ .Values.notifications.slack.recipient }}"
      enabled: true
      path: /etc/netdata/health_alarm_notify.conf
    netdata:
      data: |
        [global]
          hostname = {{ .Values.parent.hostname }}
        [db]
          mode = dbengine

        [plugins]
          cgroups = no
          tc = no
          enable running new plugins = no
          check for new plugins every = 72000
          python.d = no
          charts.d = no
          go.d = no
          node.d = no
          apps = no
          proc = no
          idlejitter = no
          diskspace = no
      enabled: true
      path: /etc/netdata/netdata.conf
    stream:
      data: |
        [11111111-2222-3333-4444-555555555555]
          enabled = yes
          history = 3600
          default memory mode = dbengine
          health enabled by default = auto
          allow from = *
      enabled: true
      path: /etc/netdata/stream.conf
  database:
    persistence: false
    storageclass: '-'
    volumesize: 5Gi
  dnsPolicy: Default
  enabled: true
  env: {}
  envFrom: []
  extraInitContainers: []
  extraVolumeMounts: []
  extraVolumes: []
  hostname: netdata-parent
  livenessProbe:
    failureThreshold: 3
    initialDelaySeconds: 0
    periodSeconds: 30
    successThreshold: 1
    timeoutSeconds: 1
  nodeSelector: {}
  podAnnotations: {}
  podLabels: {}
  port: 19999
  priorityClassName: ""
  readinessProbe:
    failureThreshold: 3
    initialDelaySeconds: 0
    periodSeconds: 30
    successThreshold: 1
    timeoutSeconds: 1
  resources: {}
  securityContext:
    fsGroup: 201
    runAsGroup: 201
    runAsUser: 201
  terminationGracePeriodSeconds: 300
  tolerations:
  - operator: Exists
rbac:
