COMPUTED VALUES:
child:
  affinity: {}
  claiming:
    enabled: false
    rooms: ""
    token: ""
    url: https://api.netdata.cloud
  configs:
    exporting:
      data: ""
      enabled: false
      path: /etc/netdata/exporting.conf
    go.d:
      data: |
        modules:
          prometheus: yes
      enabled: true
      path: /etc/netdata/go.d.conf
    kubelet:
      data: |
        update_every: 1
        autodetection_retry: 0
        jobs:
          - name: local
            url: http://127.0.0.1:10255/metrics
          - name: local
            url: https://localhost:10250/metrics
            tls_skip_verify: yes
      enabled: false
      path: /etc/netdata/go.d/k8s_kubelet.conf
    kubeproxy:
      data: |
        update_every: 1
        autodetection_retry: 0
        jobs:
          - name: local
            url: http://127.0.0.1:10249/metrics
      enabled: true
      path: /etc/netdata/go.d/k8s_kubeproxy.conf
    netdata:
      data: |-
        [global]
          enable zero metrics = yes
        [db]
          mode = ram
        [web]
          bind to = localhost:19999
        [health]
          enabled = no
        [ml]
          enabled = no
        [plugins]
          enable running new plugins = yes
          perf = yes
        [plugin:perf]
          update every = 1
          command options = all
      enabled: true
      path: /etc/netdata/netdata.conf
    prometheus:
      data: |
        jobs:
          - name: kubelet_cadvisor
            url: https://127.0.0.1:10250/metrics/cadvisor
            bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
            tls_ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            tls_skip_verify: true
            update_every: 1
            debug: true

            selector:
              allow:
                - container_cpu_usage_seconds_total
                - container_memory_working_set_bytes
                - container_network_receive_bytes_total
                - container_network_transmit_bytes_total
              deny: []
      enabled: true
      path: /etc/netdata/go.d/prometheus.conf
    stream:
      data: |
        [stream]
          enabled = {{ ternary "yes" "no" .Values.parent.enabled }}
          destination = netdata:{{ .Values.service.port }}
          api key = 11111111-2222-3333-4444-555555555555
          timeout seconds = 60
          buffer size bytes = 1048576
          reconnect delay seconds = 5
          initial clock resync iterations = 60
      enabled: true
      path: /etc/netdata/stream.conf
  dnsPolicy: ClusterFirstWithHostNet
  enabled: true
  env: {}
  envFrom: []
  extraVolumeMounts: []
  extraVolumes: []
  hostNetwork: true
  livenessProbe:
    failureThreshold: 3
    initialDelaySeconds: 0
    periodSeconds: 30
    successThreshold: 1
    timeoutSeconds: 1
  nodeSelector: {}
  persistence:
    enabled: true
    hostPath: /var/lib/netdata-k8s-child
  podAnnotationAppArmor:
    enabled: true
  podAnnotations: {}
  podLabels: {}
  podsMetadata:
    kubeletUrl: https://localhost:10250
    useKubelet: false
  port: '{{ .Values.parent.port }}'
  priorityClassName: ""
  readinessProbe:
    failureThreshold: 3
    initialDelaySeconds: 0
    periodSeconds: 30
    successThreshold: 1
    timeoutSeconds: 1
  resources: {}
  terminationGracePeriodSeconds: 30
  tolerations:
  - operator: Exists
  updateStrategy: {}
deploymentStrategy:
