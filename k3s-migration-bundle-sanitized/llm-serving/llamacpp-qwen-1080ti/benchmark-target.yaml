apiVersion: apps/v1
kind: Deployment
metadata:
  name: llamacpp-gemma4-e2b-q4km-bench
  namespace: ai-serving
  labels:
    app: llamacpp-gemma4-e2b-q4km-bench
    pre6g.io/runtime: llamacpp
    pre6g.io/benchmark-mode: offline
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: llamacpp-gemma4-e2b-q4km-bench
  template:
    metadata:
      labels:
        app: llamacpp-gemma4-e2b-q4km-bench
        pre6g.io/runtime: llamacpp
        pre6g.io/benchmark-mode: offline
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: icclz1
      terminationGracePeriodSeconds: 5
      containers:
        - name: llamacpp-bench
          image: pre6g/llamacpp-cuda118-sm61:gemma4-e2b-q4km
          imagePullPolicy: Never
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euo pipefail
              echo "[pre6g] llama.cpp offline benchmark target ready on $(hostname)"
              sleep infinity
          env:
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
          resources:
            requests:
              cpu: "2000m"
              memory: "8Gi"
              nvidia.com/gpu.shared: "1"
            limits:
              cpu: "4000m"
              memory: "12Gi"
              nvidia.com/gpu.shared: "1"
          volumeMounts:
            - name: gemma-gguf
              mountPath: /models/gemma
              readOnly: true
      volumes:
        - name: gemma-gguf
          hostPath:
            path: /var/lib/pre6g/models/gemma-4-e2b-it-gguf
            type: Directory
