COMPUTED VALUES:
extraObjects: []
global:
  cluster:
    dnsDomain: cluster.local.
  compatibility:
    openshift:
      adaptSecurityContext: auto
  image:
    registry: ""
  imagePullSecrets: []
license:
  key: ""
  secret:
    key: ""
    name: ""
nameOverride: ""
podDisruptionBudget:
  enabled: false
  labels: {}
printNotes: true
rbac:
  annotations: {}
  create: true
  extraLabels: {}
  namespaced: false
server:
  affinity: {}
  containerWorkingDir: ""
  deployment:
    spec:
      strategy:
        type: Recreate
  emptyDir: {}
  enabled: true
  env: []
  envFrom: []
  extraArgs:
    envflag.enable: true
    envflag.prefix: VM_
    httpListenAddr: :8428
    loggerFormat: json
  extraContainers: []
  extraHostPathMounts: []
  extraLabels: {}
  extraVolumeMounts: []
  extraVolumes: []
  image:
    pullPolicy: IfNotPresent
    registry: ""
    repository: victoriametrics/victoria-metrics
    tag: ""
    variant: ""
  imagePullSecrets: []
  ingress:
    annotations: {}
    enabled: false
    extraLabels: {}
    hosts:
    - name: vmsingle.local
      path:
      - /
      port: http
    pathType: Prefix
    tls: []
  initContainers: []
  lifecycle: {}
  mode: statefulSet
  nodeSelector: {}
  persistentVolume:
    accessModes:
    - ReadWriteOnce
    annotations: {}
    enabled: false
    existingClaim: ""
    extraLabels: {}
    matchLabels: {}
    mountPath: /storage
    name: ""
    size: 16Gi
    storageClassName: ""
    subPath: ""
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    enabled: true
  priorityClassName: ""
  probe:
    liveness:
      failureThreshold: 10
      initialDelaySeconds: 30
      periodSeconds: 30
      tcpSocket: {}
      timeoutSeconds: 5
    readiness:
      failureThreshold: 3
      httpGet: {}
      initialDelaySeconds: 5
      periodSeconds: 15
      timeoutSeconds: 5
    startup: {}
  relabel:
    config: []
    configMap: ""
    enabled: false
  replicaCount: 1
  resources: {}
  retentionPeriod: 1
  route:
    annotations: {}
    enabled: false
    extraRules: []
    filters: []
    hostnames: []
    labels: {}
    matches:
    - path:
        type: PathPrefix
        value: '{{ dig "extraArgs" "http.pathPrefix" "/" .Values.server }}'
    parentRefs: []
  schedulerName: ""
  scrape:
    config:
      global:
        scrape_interval: 15s
      scrape_configs:
      - job_name: victoriametrics
        static_configs:
        - targets:
          - localhost:8428
      - bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        job_name: kubernetes-apiservers
        kubernetes_sd_configs:
        - role: endpoints
        relabel_configs:
        - action: keep
          regex: default;kubernetes;https
          source_labels:
          - __meta_kubernetes_namespace
          - __meta_kubernetes_service_name
          - __meta_kubernetes_endpoint_port_name
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
      - bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        job_name: kubernetes-nodes
        kubernetes_sd_configs:
        - role: node
        relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
      - bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        honor_timestamps: false
        job_name: kubernetes-nodes-cadvisor
        kubernetes_sd_configs:
        - role: node
        metrics_path: /metrics/cadvisor
        relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        - source_labels:
          - __metrics_path__
          target_label: metrics_path
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
      - job_name: kubernetes-service-endpoints
        kubernetes_sd_configs:
        - role: endpoints
        relabel_configs:
        - action: drop
          regex: true
          source_labels:
          - __meta_kubernetes_pod_container_init
        - action: keep_if_equal
          source_labels:
          - __meta_kubernetes_service_annotation_prometheus_io_port
          - __meta_kubernetes_pod_container_port_number
        - action: keep
          regex: true
          source_labels:
          - __meta_kubernetes_service_annotation_prometheus_io_scrape
        - action: replace
          regex: (https?)
          source_labels:
          - __meta_kubernetes_service_annotation_prometheus_io_scheme
          target_label: __scheme__
        - action: replace
          regex: (.+)
          source_labels:
          - __meta_kubernetes_service_annotation_prometheus_io_path
          target_label: __metrics_path__
        - action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          source_labels:
          - __address__
          - __meta_kubernetes_service_annotation_prometheus_io_port
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_service_label_(.+)
        - action: replace
          source_labels:
          - __meta_kubernetes_namespace
          target_label: namespace
        - action: replace
          source_labels:
          - __meta_kubernetes_service_name
          target_label: service
        - action: replace
          source_labels:
          - __meta_kubernetes_pod_node_name
          target_label: node
      - job_name: kubernetes-service-endpoints-slow
        kubernetes_sd_configs:
        - role: endpoints
        relabel_configs:
        - action: drop
          regex: true
          source_labels:
          - __meta_kubernetes_pod_container_init
        - action: keep_if_equal
          source_labels:
          - __meta_kubernetes_service_annotation_prometheus_io_port
          - __meta_kubernetes_pod_container_port_number
        - action: keep
          regex: true
          source_labels:
          - __meta_kubernetes_service_annotation_prometheus_io_scrape_slow
        - action: replace
          regex: (https?)
          source_labels:
          - __meta_kubernetes_service_annotation_prometheus_io_scheme
          target_label: __scheme__
        - action: replace
          regex: (.+)
          source_labels:
          - __meta_kubernetes_service_annotation_prometheus_io_path
          target_label: __metrics_path__
        - action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          source_labels:
          - __address__
          - __meta_kubernetes_service_annotation_prometheus_io_port
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_service_label_(.+)
        - action: replace
          source_labels:
          - __meta_kubernetes_namespace
          target_label: namespace
        - action: replace
          source_labels:
          - __meta_kubernetes_service_name
          target_label: service
        - action: replace
          source_labels:
          - __meta_kubernetes_pod_node_name
          target_label: node
        scrape_interval: 5m
        scrape_timeout: 30s
      - job_name: kubernetes-services
        kubernetes_sd_configs:
        - role: service
        metrics_path: /probe
        params:
          module:
          - http_2xx
        relabel_configs:
        - action: keep
          regex: true
          source_labels:
          - __meta_kubernetes_service_annotation_prometheus_io_probe
        - source_labels:
          - __address__
          target_label: __param_target
        - replacement: blackbox
          target_label: __address__
        - source_labels:
          - __param_target
          target_label: instance
        - action: labelmap
          regex: __meta_kubernetes_service_label_(.+)
        - source_labels:
          - __meta_kubernetes_namespace
          target_label: namespace
        - source_labels:
          - __meta_kubernetes_service_name
          target_label: service
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
        - role: pod
        relabel_configs:
        - action: drop
          regex: true
          source_labels:
          - __meta_kubernetes_pod_container_init
        - action: keep_if_equal
          source_labels:
          - __meta_kubernetes_pod_annotation_prometheus_io_port
          - __meta_kubernetes_pod_container_port_number
        - action: keep
          regex: true
          source_labels:
          - __meta_kubernetes_pod_annotation_prometheus_io_scrape
        - action: replace
          regex: (.+)
          source_labels:
          - __meta_kubernetes_pod_annotation_prometheus_io_path
          target_label: __metrics_path__
        - action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          source_labels:
          - __address__
          - __meta_kubernetes_pod_annotation_prometheus_io_port
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        - action: replace
          source_labels:
          - __meta_kubernetes_namespace
          target_label: namespace
        - action: replace
          source_labels:
          - __meta_kubernetes_pod_name
          target_label: pod
    configMap: ""
    enabled: false
    extraScrapeConfigs: []
  securityContext:
    enabled: true
  service:
    annotations: {}
    clusterIP: None
    externalIPs: []
    externalTrafficPolicy: ""
    healthCheckNodePort: ""
    ipFamilies: []
    ipFamilyPolicy: ""
    labels: {}
    loadBalancerIP: ""
    loadBalancerSourceRanges: []
    servicePort: 8428
    targetPort: http
    trafficDistribution: ""
    type: ClusterIP
  serviceMonitor:
    annotations: {}
    basicAuth: {}
    enabled: false
    extraLabels: {}
    metricRelabelings: []
    relabelings: []
    targetPort: http
  statefulSet:
    spec:
      podManagementPolicy: OrderedReady
      updateStrategy: {}
  terminationGracePeriodSeconds: 60
  tolerations:
  - operator: Exists
  vmbackupmanager:
    destination: ""
    disableDaily: false
    disableHourly: false
    disableMonthly: false
    disableWeekly: false
    enabled: false
    env: []
    extraArgs:
      envflag.enable: true
      envflag.prefix: VM_
      loggerFormat: json
    extraVolumeMounts: []
    image:
      registry: ""
      repository: victoriametrics/vmbackupmanager
      tag: ""
      variant: ""
    probe:
      liveness:
        failureThreshold: 10
        initialDelaySeconds: 30
        periodSeconds: 30
        tcpSocket:
          port: manager-http
        timeoutSeconds: 5
      readiness:
        failureThreshold: 3
        httpGet:
          port: manager-http
        initialDelaySeconds: 5
        periodSeconds: 15
        timeoutSeconds: 5
      startup:
        httpGet:
          port: manager-http
    resources: {}
    restore:
      onStart:
        enabled: false
    retention:
      keepLastDaily: 2
      keepLastHourly: 2
      keepLastMonthly: 2
      keepLastWeekly: 2
serviceAccount:
  annotations: {}
  automountToken: true
  create: true
  extraLabels: {}
victoria-metrics-common:
  global:
    cluster:
      dnsDomain: cluster.local.
    compatibility:
      openshift:
        adaptSecurityContext: auto
    image:
      registry: ""
    imagePullSecrets: []
  unitTest: false
