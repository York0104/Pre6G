# Source: victoria-metrics-agent/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: vmagent-victoria-metrics-agent-config
  namespace: monitoring
  labels: 
    app.kubernetes.io/instance: vmagent
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: victoria-metrics-agent
    app.kubernetes.io/version: v1.135.0
    helm.sh/chart: victoria-metrics-agent-0.31.0
data:
  scrape.yml: |
    global:
      scrape_interval: 10s
    scrape_configs:
    - job_name: vmagent-self
      static_configs:
      - targets:
        - localhost:8429
    - job_name: kube-state-metrics
      static_configs:
      - targets:
        - kube-state-metrics.monitoring.svc:8080
    - job_name: node-exporter
      static_configs:
      - targets:
        - node-exporter.monitoring.svc:9100
    - bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      job_name: kubelet-cadvisor
      metrics_path: /metrics/cadvisor
      scheme: https
      static_configs:
      - targets:
        - 100.68.32.118:10250
      tls_config:
        insecure_skip_verify: true
