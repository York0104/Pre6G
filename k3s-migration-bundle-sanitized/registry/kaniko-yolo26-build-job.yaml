apiVersion: batch/v1
kind: Job
metadata:
  name: kaniko-build-yolo26n
  namespace: image-build
spec:
  backoffLimit: 1
  template:
    spec:
      # Retained as the full-build validation/benchmark path.
      # Daily builds should use the split base/app pipeline instead.
      # Current cluster DNS does not resolve harbor.iccl.local inside ordinary pods.
      # Keep this until harbor.iccl.local is provided by cluster-wide DNS.
      hostAliases:
        - ip: "140.113.179.9"
          hostnames:
            - "harbor.iccl.local"
      restartPolicy: Never
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:v1.23.2-debug
          args:
            # Replace the branch ref with a fixed commit SHA if you need fully reproducible builds.
            - "--context=git://github.com/York0104/Pre6G.git#refs/heads/main"
            - "--context-sub-path=autoscale-source-split/02-experiment-layer/yolo26_workload"
            - "--dockerfile=Dockerfile"
            - "--destination=harbor.iccl.local:8088/pre6g/yolo26n:REPLACE_IMAGE_TAG"
            - "--cache=true"
            - "--cache-repo=harbor.iccl.local:8088/pre6g/cache"
            - "--registry-certificate=harbor.iccl.local:8088=/kaniko/certs/harbor-ca.crt"
            - "--image-name-with-digest-file=/workspace/image-name-with-digest.txt"
          volumeMounts:
            - name: docker-config
              mountPath: /kaniko/.docker
            - name: harbor-ca
              mountPath: /kaniko/certs
              readOnly: true
      volumes:
        - name: docker-config
          secret:
            secretName: harbor-push-secret
            items:
              - key: .dockerconfigjson
                path: config.json
        - name: harbor-ca
          configMap:
            name: harbor-ca
            items:
              - key: harbor-ca.crt
                path: harbor-ca.crt
