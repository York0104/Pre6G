apiVersion: v1
kind: Pod
metadata:
  name: gpu-shared-test-5
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: REPLACE_GPU_NODE
  containers:
  - name: cuda
    image: nvidia/cuda:12.2.0-base-ubuntu22.04
    command: ["bash", "-lc", "nvidia-smi && sleep 300"]
    resources:
      limits:
        nvidia.com/gpu.shared: 1
