apiVersion: v1
kind: ServiceAccount
metadata:
  name: vm-victoria-metrics-single-server
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: Codex
    app.kubernetes.io/instance: vm
    app.kubernetes.io/name: victoria-metrics-single
---
apiVersion: v1
kind: Service
metadata:
  name: vm-victoria-metrics-single-server
  namespace: monitoring
  labels:
    app: server
    app.kubernetes.io/instance: vm
    app.kubernetes.io/name: victoria-metrics-single
spec:
  clusterIP: None
  ports:
    - name: http
      port: 8428
      protocol: TCP
      targetPort: http
  selector:
    app: server
    app.kubernetes.io/instance: vm
    app.kubernetes.io/name: victoria-metrics-single
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vm-victoria-metrics-single-server
  namespace: monitoring
  labels:
    app: server
    app.kubernetes.io/instance: vm
    app.kubernetes.io/name: victoria-metrics-single
spec:
  replicas: 1
  serviceName: vm-victoria-metrics-single-server
  selector:
    matchLabels:
      app: server
      app.kubernetes.io/instance: vm
      app.kubernetes.io/name: victoria-metrics-single
  template:
    metadata:
      labels:
        app: server
        app.kubernetes.io/instance: vm
        app.kubernetes.io/name: victoria-metrics-single
    spec:
      nodeSelector:
        kubernetes.io/hostname: iccl-cluster-z2
      serviceAccountName: vm-victoria-metrics-single-server
      tolerations:
        - operator: Exists
      containers:
        - name: vmsingle
          image: victoriametrics/victoria-metrics:v1.136.0
          imagePullPolicy: IfNotPresent
          args:
            - --envflag.enable
            - --envflag.prefix=VM_
            - --httpListenAddr=:8428
            - --loggerFormat=json
            - --retentionPeriod=1
            - --storageDataPath=/storage
          ports:
            - name: http
              containerPort: 8428
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: server-volume
              mountPath: /storage
      volumes:
        - name: server-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: victoria-metrics-nodeport
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: pre6g-autoscale
    pre6g/component: victoria-metrics-nodeport
spec:
  type: NodePort
  selector:
    app: server
    app.kubernetes.io/instance: vm
    app.kubernetes.io/name: victoria-metrics-single
  ports:
    - name: http
      protocol: TCP
      port: 8428
      targetPort: 8428
      nodePort: 31888
