apiVersion: v1
kind: ServiceAccount
metadata:
  name: vmagent-victoria-metrics-agent
  namespace: monitoring
  labels:
    app.kubernetes.io/instance: vmagent
    app.kubernetes.io/name: victoria-metrics-agent
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vmagent-victoria-metrics-agent-config
  namespace: monitoring
  labels:
    app.kubernetes.io/instance: vmagent
    app.kubernetes.io/name: victoria-metrics-agent
data:
  scrape.yml: |
    global:
      scrape_interval: 10s
    scrape_configs:
      - job_name: vmagent-self
        static_configs:
          - targets:
              - localhost:8429

      - job_name: kube-state-metrics
        static_configs:
          - targets:
              - kube-state-metrics.monitoring.svc:8080

      - job_name: dcgm-exporter
        scrape_interval: 1s
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - gpu-monitoring
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: dcgm-exporter
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            regex: "9400"
            action: keep
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: kubernetes_node
          - source_labels: [__meta_kubernetes_namespace]
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: kubernetes_pod

      - job_name: vllm-serving-pods
        scrape_interval: 1s
        scrape_timeout: 800ms
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - ai-serving
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            regex: .*metrics.*
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_init]
            regex: "false"
            action: keep
          - source_labels: [__meta_kubernetes_pod_phase]
            regex: Pending|Running
            action: keep
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: kubernetes_node
          - source_labels: [__meta_kubernetes_namespace]
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: kubernetes_pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: kubernetes_container

      - job_name: rfsoc4x2-node-exporter
        static_configs:
          - targets:
              - 100.91.37.32:9100
            labels:
              node: rfsoc4x2-pynq
              role: external-rfsoc
              arch: aarch64
              device: RFSoC4x2
              access: tailscale
              lab_ip: 192.168.100.217
              k8s_node: "false"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vmagent-node-local-template
  namespace: monitoring
  labels:
    app.kubernetes.io/instance: vmagent-node-local
    app.kubernetes.io/name: victoria-metrics-agent
data:
  scrape.yml.tpl: |
    global:
      scrape_interval: 10s
    scrape_configs:
      - job_name: node-exporter
        static_configs:
          - targets:
              - 127.0.0.1:9100
            labels:
              instance: __NODE_IP__:9100
              kubernetes_node: __NODE_NAME__

      - job_name: kubelet-cadvisor
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        scheme: https
        tls_config:
          insecure_skip_verify: true
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        static_configs:
          - targets:
              - 140.113.179.9:6443
            labels:
              instance: __NODE_NAME__
              kubernetes_node: __NODE_NAME__
        metrics_path: /api/v1/nodes/__NODE_NAME__/proxy/metrics/cadvisor
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vmagent-victoria-metrics-agent-rw
  namespace: monitoring
data: {}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vmagent-victoria-metrics-agent
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods", "pods/proxy", "nodes", "nodes/metrics", "nodes/proxy"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vmagent-victoria-metrics-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vmagent-victoria-metrics-agent
subjects:
  - kind: ServiceAccount
    name: vmagent-victoria-metrics-agent
    namespace: monitoring
---
apiVersion: v1
kind: Service
metadata:
  name: vmagent
  namespace: monitoring
  labels:
    app.kubernetes.io/instance: vmagent
    app.kubernetes.io/name: victoria-metrics-agent
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8429
      targetPort: http
  selector:
    app.kubernetes.io/instance: vmagent
    app.kubernetes.io/name: victoria-metrics-agent
    app.kubernetes.io/component: cluster
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmagent-victoria-metrics-agent
  namespace: monitoring
  labels:
    app.kubernetes.io/instance: vmagent
    app.kubernetes.io/name: victoria-metrics-agent
    app.kubernetes.io/component: cluster
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: vmagent
      app.kubernetes.io/name: victoria-metrics-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: vmagent
        app.kubernetes.io/name: victoria-metrics-agent
        app.kubernetes.io/component: cluster
    spec:
      nodeSelector:
        kubernetes.io/hostname: icclz2
      serviceAccountName: vmagent-victoria-metrics-agent
      containers:
        - name: vmagent
          image: victoriametrics/vmagent:v1.135.0
          imagePullPolicy: IfNotPresent
          args:
            - --envflag.enable
            - --envflag.prefix=VM_
            - --httpListenAddr=:8429
            - --loggerFormat=json
            - --promscrape.config=/config/scrape/scrape.yml
            - --remoteWrite.tmpDataPath=/tmpData
            - --remoteWrite.url=http://140.113.179.9:31888/api/v1/write
          ports:
            - name: http
              containerPort: 8429
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
          volumeMounts:
            - name: tmpdata
              mountPath: /tmpData
            - name: scrape-config
              mountPath: /config/scrape
            - name: rw-config
              mountPath: /config/rw
      volumes:
        - name: tmpdata
          emptyDir: {}
        - name: rw-config
          configMap:
            name: vmagent-victoria-metrics-agent-rw
        - name: scrape-config
          configMap:
            name: vmagent-victoria-metrics-agent-config
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vmagent-node-local
  namespace: monitoring
  labels:
    app.kubernetes.io/instance: vmagent-node-local
    app.kubernetes.io/name: victoria-metrics-agent
    app.kubernetes.io/component: node-local
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: vmagent-node-local
      app.kubernetes.io/name: victoria-metrics-agent
      app.kubernetes.io/component: node-local
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: vmagent-node-local
        app.kubernetes.io/name: victoria-metrics-agent
        app.kubernetes.io/component: node-local
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: vmagent-victoria-metrics-agent
      initContainers:
        - name: render-scrape-config
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              sed \
                -e "s/__NODE_NAME__/${NODE_NAME}/g" \
                -e "s/__NODE_IP__/${NODE_IP}/g" \
                /config-template/scrape.yml.tpl > /rendered/scrape.yml
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: rendered-config
              mountPath: /rendered
      containers:
        - name: vmagent
          image: victoriametrics/vmagent:v1.135.0
          imagePullPolicy: IfNotPresent
          args:
            - --envflag.enable
            - --envflag.prefix=VM_
            - --httpListenAddr=:8429
            - --loggerFormat=json
            - --promscrape.config=/config/scrape/scrape.yml
            - --remoteWrite.tmpDataPath=/tmpData
            - --remoteWrite.url=http://140.113.179.9:31888/api/v1/write
          ports:
            - name: http
              containerPort: 8429
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
          volumeMounts:
            - name: tmpdata
              mountPath: /tmpData
            - name: rendered-config
              mountPath: /config/scrape
            - name: rw-config
              mountPath: /config/rw
      volumes:
        - name: tmpdata
          emptyDir: {}
        - name: rw-config
          configMap:
            name: vmagent-victoria-metrics-agent-rw
        - name: config-template
          configMap:
            name: vmagent-node-local-template
        - name: rendered-config
          emptyDir: {}
