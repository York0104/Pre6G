apiVersion: nfd.k8s-sigs.io/v1alpha1
kind: NodeFeatureRule
metadata:
  name: nvidia-gpu-aliases
spec:
  rules:
    - name: nvidia-gpu-pci-vendor-alias
      labels:
        feature.node.kubernetes.io/pci-10de.present: "true"
      matchFeatures:
        - feature: pci.device
          matchExpressions:
            class:
              op: In
              value:
                - "0300"
                - "0302"
            vendor:
              op: In
              value:
                - "10de"
