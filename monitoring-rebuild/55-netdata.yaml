apiVersion: v1
data:
  go.d: "default_run: no\nmodules:\n  k8s_state: yes\n"
  go.d-k8s_state: "jobs:\n  - name: k8s_state\n    update_every: 1\n"
  netdata: "[global]\n  hostname = netdata-k8s-state\n[db]\n  mode = ram\n[web]\n\
    \  bind to = localhost:19999\n[health]\n  enabled = no\n[ml]\n  enabled = no\n\
    [plugins]\n  timex = no\n  checks = no\n  idlejitter = no\n  tc = no\n  diskspace\
    \ = no\n  proc = no\n  cgroups = no\n  enable running new plugins = no\n  slabinfo\
    \ = no\n  perf = no\n  go.d = yes\n  ioping = no\n  ebpf = no\n  charts.d = no\n\
    \  apps = no\n  python.d = no\n  fping = no\n"
  stream: "[stream]\n  enabled = yes\n  destination = netdata:19999\n  api key = 11111111-2222-3333-4444-555555555555\n\
    \  timeout seconds = 60\n  buffer size bytes = 1048576\n  reconnect delay seconds\
    \ = 5\n  initial clock resync iterations = 60\n"
